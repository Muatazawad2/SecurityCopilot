Descriptor:
  Name: MuatazAwad-HeaderStage2
  DisplayName: Header Stage 2 Skillset
  Description: Direct header analysis agent without child tools.

SkillGroups:
  - Format: AGENT
    Skills:
      - Name: HeaderStage2Entrypoint
        DisplayName: Header Stage 2 Entrypoint
        Description: Directly analyzes email headers and returns a short phishing assessment.
        Interfaces:
          - Agent
        Inputs:
          - Name: EmailHeaders
            Description: Raw email headers to investigate.
            Required: true
        Settings:
          Instructions: |
            Analyze the provided raw email headers directly.

            Return a concise response with exactly these sections:
            Suspicious traits:
            - Up to 5 bullets

            Key indicators:
            - sender if present
            - return-path if present
            - subject if present
            - any IP addresses found
            - SPF, DKIM, or DMARC findings if present

            Assessment:
            - one short paragraph stating whether the email looks low, medium, or high risk for phishing

            Final line:
            Suspicious certainty: <N>%

AgentDefinitions:
  - Name: MuatazAwad-HeaderStage2
    DisplayName: Header Stage 2 Agent
    Description: Tests direct email header analysis without tool orchestration.
    Publisher: muataz awad
    Product: SecurityOperations
    RequiredSkillsets:
      - MuatazAwad-HeaderStage2
    AgentSingleInstanceConstraint: None
    Triggers:
      - Name: Default
        DefaultPeriodSeconds: 0
        ProcessSkill: MuatazAwad-HeaderStage2.HeaderStage2Entrypoint
