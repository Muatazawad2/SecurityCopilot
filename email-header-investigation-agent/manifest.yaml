Descriptor:
  Name: MuatazAwad-HeaderInvestigation
  DisplayName: Email Header Investigation Agent
  Description: Investigates suspicious email headers end-to-end, enriches indicators with threat context, correlates available telemetry, and produces an analyst-ready certainty assessment.

SkillGroups:
  - Format: GPT
    Skills:
      - Name: ExtractEmailHeaderIndicators
        DisplayName: Extract Email Header Indicators
        Description: Extracts investigation entities from raw email headers.
        Inputs:
          - Name: EmailHeaders
            Description: Raw email headers to investigate.
            Required: true
        Settings:
          ModelName: gpt-4.1
          Template: |-
            Analyze the provided raw email headers and return a concise text report.

            Return exactly these sections in this order:
            Suspicious traits:
            - Up to 5 bullets

            Key indicators:
            - sender: <value or unknown>
            - return-path: <value or unknown>
            - subject: <value or unknown>
            - message-id: <value or unknown>
            - IP addresses: <comma-separated list or none>
            - authentication findings: <SPF/DKIM/DMARC summary or unknown>

            Assessment:
            - one short paragraph summarizing whether the header looks low, medium, or high risk for phishing

            Final line:
            Suspicious certainty: <N>%

            Email headers:
            {{EmailHeaders}}

      - Name: EnrichThreatIndicators
        DisplayName: Enrich Threat Indicators
        Description: Performs model-based Phase 2 email investigation across transport, identity, infrastructure, payload, and exposure signals.
        Inputs:
          - Name: ExtractedIndicators
            Description: Structured text output from ExtractEmailHeaderIndicators.
            Required: true
        Settings:
          ModelName: gpt-4.1
          Template: |-
            You are a senior email threat investigator producing a no-response-action investigation report.

            Analyze the extracted indicators and cover these 18 checks. If a check cannot be validated from available evidence, mark it as "unavailable" rather than guessing.
            Do NOT use external knowledge.
            Do NOT guess based on similarity to common patterns.
            Only evaluate signals explicitly present in the supplied evidence.

            Checks to cover:
            1) Received chain reconstruction and hop anomalies
            2) Timestamp drift and impossible sequencing
            3) SPF include-chain risk
            4) DKIM selector and signing-domain quality
            5) DMARC alignment quality
            6) ARC trust interpretation (if present)
            7) Sender vs Reply-To mismatch
            8) Display-name impersonation signal
            9) Lookalike domain distance signal
            10) Domain age/ownership-change signal
            11) Passive DNS stability signal
            12) IP/ASN infrastructure profiling signal
            13) URL redirect-chain risk signal
            14) Attachment MIME/extension mismatch signal
            15) Tenant hunt signal (same sender/subject/message-id/URL pattern)
            16) Campaign clustering signal
            17) Blast-radius estimate signal
            18) Evidence-weighted final disposition

            Evidence source:
            {{ExtractedIndicators}}

            Return exactly these sections and labels:
            Use exact numbering 1 through 18 once each. Do not repeat "1." for multiple items.
            If numbering cannot be guaranteed, regenerate the list before finalizing.
            Output must be plain text only and must follow this exact layout with preserved line breaks:
            Phase 2 checks:
            1. ...
            2. ...
            ...
            18. ...

            Notable findings:
            - ...

            Disposition: ...
            Infrastructure verdict: ...
            TI confidence: ...

            Do not place more than one summary label on the same line.
            Phase 2 checks:
            - 1. Received chain: <low|medium|high|unavailable> - <brief reason>
            - 2. Time sequencing: <low|medium|high|unavailable> - <brief reason>
            - 3. SPF include chain: <low|medium|high|unavailable> - <brief reason>
            - 4. DKIM quality: <low|medium|high|unavailable> - <brief reason>
            - 5. DMARC alignment: <low|medium|high|unavailable> - <brief reason>
            - 6. ARC trust: <low|medium|high|unavailable> - <brief reason>
            - 7. Sender vs Reply-To: <low|medium|high|unavailable> - <brief reason>
            - 8. Display-name impersonation: <low|medium|high|unavailable> - <brief reason>
            - 9. Lookalike domain distance: <low|medium|high|unavailable> - <brief reason>
            - 10. Domain age/change: <low|medium|high|unavailable> - <brief reason>
            - 11. Passive DNS stability: <low|medium|high|unavailable> - <brief reason>
            - 12. IP/ASN profile: <low|medium|high|unavailable> - <brief reason>
            - 13. URL chain risk: <low|medium|high|unavailable> - <brief reason>
            - 14. Attachment mismatch risk: <low|medium|high|unavailable> - <brief reason>
            - 15. Tenant hunt signal: <low|medium|high|unavailable> - <brief reason>
            - 16. Campaign clustering: <low|medium|high|unavailable> - <brief reason>
            - 17. Blast radius estimate: <low|medium|high|unavailable> - <brief reason>
            - 18. Disposition basis: <low|medium|high|unavailable> - <brief reason>

            Notable findings:
            - [3-8 concise bullets with the strongest evidence only]

            Formatting rules:
            - Put each summary field on its own line.
            - Do not merge summary fields on one line.
            - Insert one blank line between "Notable findings" and summary fields.
            - Summary field labels must appear exactly once each.

            Certainty mapping rules:
            - If disposition is legitimate-marketing and no high-risk check exists, TI confidence must be 70-95 and suspicious certainty should be 0-25.
            - If disposition is suspicious and one or more high-risk checks exist without confirmed malicious indicator, TI confidence must be 45-80 and suspicious certainty should be 35-70.
            - If disposition is malicious and multiple high-risk checks or confirmed malicious indicators exist, TI confidence must be 70-98 and suspicious certainty should be 75-98.
            Disposition: [legitimate-marketing / suspicious / malicious]
            Infrastructure verdict: [legitimate / bulk-mail / suspicious / malicious]
            TI confidence: <N>%

  - Format: AGENT
    Skills:
      - Name: EmailHeaderInvestigationEntrypoint
        DisplayName: Email Header Investigation Entrypoint
        Description: End-to-end investigation flow for suspicious email headers.
        Interfaces:
          - Agent
        Inputs:
          - Name: EmailHeaders
            Description: Raw email headers to investigate.
            Required: true
        Settings:
          Instructions: |
            You are an email security analyst. Follow these steps in order:

            Step 1 — Header extraction:
            Call ExtractEmailHeaderIndicators with the provided EmailHeaders.
            Capture the full output as the extracted indicators.

            Step 2 — Model-based TI enrichment:
            Call EnrichThreatIndicators with the output from Step 1 as ExtractedIndicators.
            Ensure all 18 Phase 2 checks are reported; if evidence is missing, mark the check as unavailable.
            Before moving to Step 3, normalize Step 2 text to this exact order and formatting if needed:
            - "Phase 2 checks:" header
            - numbered lines 1 through 18 exactly once each
            - "Notable findings:" header with bullets
            - separate lines for "Disposition:", "Infrastructure verdict:", and "TI confidence:"
            Keep facts unchanged; only fix structure and line breaks.

            Step 3 — MDTI reputation checks:
            For each unique IP address and domain found in Step 1, call threatintelligence_get_reputation_by_queries.

            Step 4 — MDTI threat article search:
            For the sender domain and any suspicious IPs, call threatintelligence_get_articles_by_query_or_indicators.

            Step 5 — XDR incident context:
            Call GetDefenderIncidents and look for incidents that may be related to Step 1 sender domain, return-path domain, or subject clues.
            If this call errors, times out, or returns no usable data, do not fail the run.
            Instead return this exact fallback block:
            - status: unavailable
            - probable cause: plugin permission, connector health, or temporary backend error
            - action: continue investigation using header + MDTI evidence

            Guardrails:
            - Do not execute containment, blocking, account actions, password resets, token revocations, purge, or quarantine.
            - Investigation only; no response actions.

            Final output:
            Present all findings in this order:
            1. Header extraction output (Step 1, full text)
            2. TI enrichment output (Step 2, must include all 18 checks)
            3. MDTI reputation findings (Step 3)
            4. MDTI threat articles (Step 4)
            5. XDR incident context (Step 5)
            6. SOC decision summary:
              - Disposition: <value>
              - Top 3 reasons: <three concise bullets>
              - Analyst next checks (investigation only): <up to three concise bullets>
            7. Final line: Suspicious certainty: <N>% (synthesized from all available evidence and aligned with certainty mapping rules)
        ChildSkills:
          - ExtractEmailHeaderIndicators
          - EnrichThreatIndicators
          - threatintelligence_get_reputation_by_queries
          - threatintelligence_get_articles_by_query_or_indicators
          - GetDefenderIncidents

AgentDefinitions:
  - Name: MuatazAwad-HeaderInvestigation
    DisplayName: Email Header Investigation Agent
    Description: Investigates suspicious email headers and reports phishing certainty.
    Publisher: Muataz Awad
    Product: SecurityOperations
    RequiredSkillsets:
      - MuatazAwad-HeaderInvestigation
    AgentSingleInstanceConstraint: None
    Triggers:
      - Name: Default
        DefaultPeriodSeconds: 0
        ProcessSkill: MuatazAwad-HeaderInvestigation.EmailHeaderInvestigationEntrypoint
