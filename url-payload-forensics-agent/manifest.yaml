Descriptor:
  Name: MuatazAwad-UrlPayloadForensics
  DisplayName: URL and Payload Forensics Agent
  Description: Investigates URLs and payload indicators from suspicious emails and produces an analyst-ready risk assessment.

SkillGroups:
  - Format: GPT
    Skills:
      - Name: ExtractUrlPayloadIndicators
        DisplayName: Extract URL and Payload Indicators
        Description: Extracts URLs, domains, redirect hints, and payload indicators from email artifacts.
        Inputs:
          - Name: EmailArtifacts
            Description: Email body, links, attachment names, hashes, and related investigation artifacts.
            Required: true
        Settings:
          ModelName: gpt-4.1
          Template: |-
            Analyze the provided email artifacts and return a concise extraction report.

            Return exactly these sections in this order:
            Suspicious traits:
            - Up to 6 bullets

            Extracted indicators:
            - URLs: <comma-separated list or none>
            - domains: <comma-separated list or none>
            - IP addresses: <comma-separated list or none>
            - file names: <comma-separated list or none>
            - file hashes: <comma-separated list or none>
            - attachment types: <comma-separated list or none>

            Payload observations:
            - one short paragraph on payload/lure characteristics from provided evidence only

            Final line:
            URL payload certainty: <N>%

            Email artifacts:
            {{EmailArtifacts}}

      - Name: EnrichUrlPayloadRisk
        DisplayName: Enrich URL and Payload Risk
        Description: Performs model-based URL and payload risk assessment with strict evidence-only reasoning.
        Inputs:
          - Name: ExtractedIndicators
            Description: Structured text output from ExtractUrlPayloadIndicators.
            Required: true
        Settings:
          ModelName: gpt-4.1
          Template: |-
            You are a senior email security investigator producing an investigation-only forensics report.

            Evaluate only the supplied indicators. If a signal cannot be derived from the evidence, mark it as "unavailable".
            Do NOT use external knowledge.
            Do NOT guess based on common patterns.
            Do NOT recommend containment or response actions.

            Checks to cover:
            1) URL structure risk (deceptive paths, encoded params)
            2) Redirect-chain evidence quality
            3) Lookalike domain distance signal
            4) Domain trust signal from visible evidence
            5) IP/hosting signal from visible evidence
            6) Attachment-type risk signal
            7) File hash observability signal
            8) Lure and social engineering signal
            9) Credential-harvest indicator signal
            10) Malware delivery indicator signal
            11) Campaign reusability signal
            12) Evidence-weighted disposition basis

            Evidence source:
            {{ExtractedIndicators}}

            Return exactly these sections and labels:
            Forensics checks:
            - 1. URL structure risk: <low|medium|high|unavailable> - <brief reason>
            - 2. Redirect chain evidence: <low|medium|high|unavailable> - <brief reason>
            - 3. Lookalike domain distance: <low|medium|high|unavailable> - <brief reason>
            - 4. Domain trust signal: <low|medium|high|unavailable> - <brief reason>
            - 5. IP/hosting signal: <low|medium|high|unavailable> - <brief reason>
            - 6. Attachment-type risk: <low|medium|high|unavailable> - <brief reason>
            - 7. File hash observability: <low|medium|high|unavailable> - <brief reason>
            - 8. Lure and social engineering: <low|medium|high|unavailable> - <brief reason>
            - 9. Credential-harvest indicators: <low|medium|high|unavailable> - <brief reason>
            - 10. Malware delivery indicators: <low|medium|high|unavailable> - <brief reason>
            - 11. Campaign reusability: <low|medium|high|unavailable> - <brief reason>
            - 12. Disposition basis: <low|medium|high|unavailable> - <brief reason>

            Notable findings:
            - [3-8 concise bullets with strongest evidence only]

            Formatting rules:
            - Keep each summary field on its own line.
            - Do not merge summary fields.
            Disposition: [benign-link / suspicious-link / malicious-link / unavailable]
            Payload verdict: [benign / suspicious / malicious / unavailable]
            TI confidence: <N>%

  - Format: AGENT
    Skills:
      - Name: UrlPayloadForensicsEntrypoint
        DisplayName: URL and Payload Forensics Entrypoint
        Description: End-to-end URL and payload investigation flow for suspicious email artifacts.
        Interfaces:
          - Agent
        Inputs:
          - Name: EmailArtifacts
            Description: Email body, links, attachment names, hashes, and related artifacts.
            Required: true
        Settings:
          Instructions: |
            You are an email security analyst. Follow these steps in order:

            Step 1 - Indicator extraction:
            Call ExtractUrlPayloadIndicators with the provided EmailArtifacts.
            Capture the full output as extracted indicators.

            Step 2 - Model-based forensics enrichment:
            Call EnrichUrlPayloadRisk with the output from Step 1 as ExtractedIndicators.
            Ensure all 12 forensics checks are reported; if evidence is missing, mark unavailable.

            Step 3 - MDTI reputation checks:
            For each unique URL, domain, IP, and file hash found in Step 1, call threatintelligence_get_reputation_by_queries.

            Step 4 - MDTI article correlation:
            For suspicious URLs/domains and high-risk indicators from Step 2, call threatintelligence_get_articles_by_query_or_indicators.

            Guardrails:
            - Investigation only; no automated response actions.
            - Do not recommend purge, quarantine, account actions, password resets, token revocation, or blocking.

            Final output:
            Present all findings in this order:
            1. Indicator extraction output (Step 1, full text)
            2. Forensics enrichment output (Step 2, full text)
            3. MDTI reputation findings (Step 3)
            4. MDTI threat articles (Step 4)
            5. Final line: URL payload certainty: <N>% (synthesized from all available evidence)
        ChildSkills:
          - ExtractUrlPayloadIndicators
          - EnrichUrlPayloadRisk
          - threatintelligence_get_reputation_by_queries
          - threatintelligence_get_articles_by_query_or_indicators

AgentDefinitions:
  - Name: MuatazAwad-UrlPayloadForensics
    DisplayName: URL and Payload Forensics Agent
    Description: Investigates suspicious URLs and payload indicators from email artifacts.
    Publisher: Muataz Awad
    Product: SecurityOperations
    RequiredSkillsets:
      - MuatazAwad-UrlPayloadForensics
    AgentSingleInstanceConstraint: None
    Triggers:
      - Name: Default
        DefaultPeriodSeconds: 0
        ProcessSkill: MuatazAwad-UrlPayloadForensics.UrlPayloadForensicsEntrypoint
